<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>科研工作日志 — Daily Research Log</title>
<style>
/* ========== CSS Variables ========== */
:root {
  --bg: #fdf6ee;
  --bg-card: #fffef9;
  --bg-sidebar: #faf5eb;
  --text: #3d3226;
  --text-secondary: #8b7e6a;
  --text-muted: #b8a99a;
  --border: #e8ddd0;
  --accent: #c8945a;
  --accent-hover: #b0783e;
  --accent-light: #f5ebe0;
  --accent-soft: #faf3e9;
  --today-bg: #fdf2e0;
  --today-border: #c8945a;
  --danger: #c0392b;
  --danger-hover: #a93226;
  --danger-bg: #fde8e8;
  --green: #6b9b6b;
  --shadow: 0 2px 12px rgba(61, 50, 38, 0.06);
  --shadow-lg: 0 8px 30px rgba(61, 50, 38, 0.1);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
  --font-serif: 'Georgia', 'Times New Roman', 'Noto Serif SC', serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --content-font-size: 15px;
  --title-font-size: 1.15rem;
}
[data-theme="dark"] {
  --bg: #1e1b18;
  --bg-card: #2a2520;
  --bg-sidebar: #231f1b;
  --text: #e8dccf;
  --text-secondary: #a09484;
  --text-muted: #6b5f52;
  --border: #3d352b;
  --accent: #d4a86a;
  --accent-hover: #e0b878;
  --accent-light: #3a3025;
  --accent-soft: #332b22;
  --today-bg: #3a3025;
  --today-border: #d4a86a;
  --danger-bg: #3d2020;
  --shadow: 0 2px 12px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.3);
}

/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  transition: background var(--transition), color var(--transition);
}
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, textarea { font-family: inherit; outline: none; }

/* ========== Sidebar ========== */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 16px;
  gap: 14px;
  overflow-y: auto;
  transition: background var(--transition), border var(--transition);
}
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header h1 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.sidebar-header h1 .icon { font-size: 1.3rem; }

.theme-toggle {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.theme-toggle:hover { background: var(--accent-light); }

/* Month nav */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
}
.month-nav button {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: transparent;
  color: var(--text-secondary);
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.month-nav button:hover { background: var(--accent-light); color: var(--accent); }
.month-nav .month-label {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text);
  min-width: 110px;
  text-align: center;
}

/* Calendar */
.calendar { user-select: none; }
.calendar .weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 4px;
}
.calendar .days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.calendar .day {
  height: 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  position: relative;
  transition: all var(--transition);
  background: transparent;
  line-height: 1;
}
.calendar .day:hover { background: var(--accent-light); }
.calendar .day.today {
  background: var(--today-bg);
  color: var(--accent);
  box-shadow: inset 0 0 0 2px var(--today-border);
}
.calendar .day.today .day-num { font-weight: 700; }
.calendar .day.active {
  background: var(--accent);
  color: #fff;
  box-shadow: var(--shadow);
}
.calendar .day.active .day-num { font-weight: 700; }
.calendar .day.other-month { color: var(--text-muted); opacity: 0.4; }
.calendar .day .day-num {
  font: 400 13px/1 'Courier New', monospace;
  font-variant-numeric: tabular-nums;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: geometricPrecision;
  letter-spacing: 0;
  word-spacing: 0;
  display: block;
  text-align: center;
  width: 100%;
}
.calendar .day.today .day-num { font-weight: 700; }
.calendar .day.active .day-num { font-weight: 700; color: #fff; }
.calendar .day .day-badge {
  font-size: 0.5rem;
  line-height: 1;
  height: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.calendar .day .dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
}
.calendar .day.active .dot { background: #fff; }
.calendar .day .mood-mini {
  font-size: 0.5rem;
  line-height: 1;
}

/* Quick buttons */
.sidebar-actions {
  display: flex;
  gap: 8px;
}
.sidebar-actions button {
  flex: 1;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  font-weight: 600;
  transition: all var(--transition);
}
.btn-today { background: var(--accent); color: #fff; }
.btn-today:hover { background: var(--accent-hover); }
.btn-export {
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border) !important;
}
.btn-export:hover { background: var(--accent-light); }

/* Search */
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.82rem;
  transition: all var(--transition);
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.search-wrap .search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.85rem;
  pointer-events: none;
}
.search-results {
  max-height: 180px;
  overflow-y: auto;
  display: none;
  margin-top: 4px;
}
.search-results.visible { display: block; }
.search-result-item {
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.78rem;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
  display: flex; align-items: center; gap: 6px;
}
.search-result-item:hover { background: var(--accent-light); }
.search-result-item .sr-date { font-weight: 600; color: var(--text); white-space: nowrap; }
.search-result-item .sr-mood { font-size: 1rem; }
.search-result-item .sr-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Reminder settings */
.reminder-section {
  border-top: 1px solid var(--border);
  padding-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.reminder-section .section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 6px;
}
.reminder-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
/* Toggle switch */
.toggle-switch {
  position: relative;
  width: 40px; height: 22px;
  flex-shrink: 0;
}
.toggle-switch input { display: none; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--border);
  border-radius: 11px;
  cursor: pointer;
  transition: all var(--transition);
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  left: 2px; top: 2px;
  background: #fff;
  border-radius: 50%;
  transition: all var(--transition);
}
.toggle-switch input:checked + .toggle-slider {
  background: var(--accent);
}
.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(18px);
}
.reminder-label {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.reminder-time-input {
  width: 80px;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.8rem;
  text-align: center;
}
.reminder-time-input:focus { border-color: var(--accent); }
.reminder-status {
  font-size: 0.65rem;
  color: var(--text-muted);
}

/* Stats */
.stats {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
  padding: 8px 0;
  border-top: 1px solid var(--border);
}

/* ========== Main Area ========== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 32px;
  transition: background var(--transition);
}
.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  flex-shrink: 0;
}
.date-display {
  font-family: var(--font-serif);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}
.date-display .weekday { color: var(--text-secondary); font-size: 0.9rem; font-family: var(--font-sans); }

.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.view-toggle {
  display: flex;
  background: var(--bg-sidebar);
  border-radius: 20px;
  padding: 3px;
  border: 1px solid var(--border);
}
.view-toggle button {
  padding: 6px 14px;
  border-radius: 18px;
  font-size: 0.8rem;
  font-weight: 600;
  background: transparent;
  color: var(--text-secondary);
  transition: all var(--transition);
  white-space: nowrap;
}
.view-toggle button.active { background: var(--accent); color: #fff; box-shadow: var(--shadow); }

.font-size-ctrl {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg-sidebar);
  border-radius: 20px;
  padding: 2px;
  border: 1px solid var(--border);
}
.font-size-ctrl button {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.font-size-ctrl button:hover { background: var(--accent-light); color: var(--accent); }
.font-size-ctrl .fs-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  min-width: 28px;
  text-align: center;
  font-weight: 600;
}

.btn-save-all {
  padding: 7px 16px;
  border-radius: 20px;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  font-size: 0.82rem;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.btn-save-all:hover { background: var(--accent-hover); }
.btn-save-all.saved { background: var(--green); }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  gap: 12px;
}
.empty-state .big-icon { font-size: 4rem; }
.empty-state p { font-size: 0.9rem; }

/* ========== LOG BLOCKS ========== */
.log-blocks {
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 820px;
  width: 100%;
  padding-bottom: 20px;
}
.log-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  position: relative;
}
.log-block:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.log-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 8px;
}
.log-block-header .block-index {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.log-block .mood-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}
.log-block .mood-btn {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  font-size: 1.1rem;
  background: var(--bg);
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.log-block .mood-btn:hover { background: var(--accent-light); transform: scale(1.1); }
.log-block .mood-btn.selected {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: scale(1.12);
}
.log-block .mood-label {
  font-size: 0.55rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: 1px;
}
.log-block .block-title {
  width: 100%;
  padding: 8px 12px;
  font-size: var(--title-font-size);
  font-weight: 600;
  border: none;
  border-bottom: 2px solid var(--border);
  background: transparent;
  color: var(--text);
  transition: border var(--transition);
  margin-bottom: 10px;
}
.log-block .block-title:focus { border-bottom-color: var(--accent); }
.log-block .block-title::placeholder { color: var(--text-muted); }
.log-block .block-content {
  width: 100%;
  min-height: 140px;
  padding: 12px;
  font-size: var(--content-font-size);
  line-height: 1.8;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  resize: vertical;
  font-family: var(--font-serif);
  font-variant-numeric: lining-nums tabular-nums;
  transition: all var(--transition);
}
.log-block .block-content:focus { border-color: var(--accent); }
.log-block .block-meta {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 6px;
}
.log-block .btn-remove-block {
  padding: 4px 10px;
  border-radius: 12px;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.7rem;
  transition: all var(--transition);
}
.log-block .btn-remove-block:hover { background: var(--danger-bg); color: var(--danger); }

.btn-add-block {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px;
  border-radius: var(--radius);
  border: 2px dashed var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 600;
  transition: all var(--transition);
  max-width: 820px;
  width: 100%;
  margin-top: 4px;
}
.btn-add-block:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

/* ========== IMAGE ATTACHMENTS ========== */
.log-block .images-area {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.log-block .img-thumb {
  position: relative;
  width: 120px;
  height: 90px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: all var(--transition);
  flex-shrink: 0;
}
.log-block .img-thumb:hover { border-color: var(--accent); transform: scale(1.02); }
.log-block .img-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.log-block .img-thumb .img-remove {
  position: absolute;
  top: 2px; right: 2px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  color: #fff;
  font-size: 0.65rem;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity var(--transition);
}
.log-block .img-thumb:hover .img-remove { opacity: 1; }
.log-block .img-add-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border-radius: 14px;
  background: var(--bg);
  border: 1px dashed var(--border);
  color: var(--text-muted);
  font-size: 0.72rem;
  transition: all var(--transition);
  margin-top: 6px;
}
.log-block .img-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Image lightbox */
.img-lightbox {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center; justify-content: center;
  z-index: 300;
  cursor: pointer;
}
.img-lightbox.visible { display: flex; }
.img-lightbox img {
  max-width: 92vw;
  max-height: 92vh;
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

/* ========== LIST VIEW ========== */
.list-view {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 820px;
  width: 100%;
  padding-bottom: 40px;
}
.list-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow);
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.list-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}
.list-card .lc-mood { font-size: 1.8rem; flex-shrink: 0; width: 44px; text-align: center; line-height: 1; }
.list-card .lc-body { flex: 1; min-width: 0; }
.list-card .lc-date { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
.list-card .lc-title {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px;
}
.list-card .lc-title .lc-block-tag {
  font-size: 0.6rem;
  font-weight: 500;
  background: var(--accent-light);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
}
.list-card .lc-preview {
  font-size: var(--content-font-size);
  color: var(--text-secondary);
  line-height: 1.5;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--font-serif);
}
.list-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.list-empty .big-icon { font-size: 3rem; display: block; margin-bottom: 12px; }

/* ========== REMINDER MODAL ========== */
.reminder-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  animation: fadeIn 0.3s ease;
}
.reminder-modal-overlay.visible { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.reminder-modal {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 30px;
  width: 90%;
  max-width: 440px;
  box-shadow: var(--shadow-lg);
  text-align: center;
  display: flex; flex-direction: column; gap: 16px;
  align-items: center;
  animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.reminder-modal .rem-icon { font-size: 3.5rem; }
.reminder-modal h2 { font-size: 1.2rem; color: var(--text); }
.reminder-modal p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; }
.reminder-modal .rem-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.reminder-modal .rem-actions button {
  padding: 10px 24px;
  border-radius: 24px;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all var(--transition);
}
.btn-rem-write {
  background: var(--accent);

}

/* ========== Toast ========== */

/* Export option buttons */

/* ========== Responsive ========== */
@media (max-width: 768px) {
  body { flex-direction: column; }

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ==================== DATA LAYER ====================
const STORAGE_PREFIX = 'drlog-';
const INDEX_KEY = STORAGE_PREFIX + 'index';
const FONT_SIZE_KEY = 'drlog-font-size';
const VIEW_MODE_KEY = 'drlog-view-mode';
const REMINDER_KEY = 'drlog-reminder';
const REMINDER_LAST_KEY = 'drlog-reminder-last';

function getMonthKey(y, m) { return STORAGE_PREFIX + `${y}-${String(m).padStart(2,'0')}`; }
function getDayKey(y, m, d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function loadIndex() {
  try { const r = localStorage.getItem(INDEX_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function saveIndex(months) { localStorage.setItem(INDEX_KEY, JSON.stringify(months)); }

function loadMonth(y, m) {
  try { const r = localStorage.getItem(getMonthKey(y, m)); return r ? JSON.parse(r) : {}; }
  catch { return {}; }
}
function saveMonth(y, m, data) {
  const key = getMonthKey(y, m);
  const hasData = Object.keys(data).length > 0;
  if (hasData) {
    localStorage.setItem(key, JSON.stringify(data));
    const idx = loadIndex();
    const ms = `${y}-${String(m).padStart(2,'0')}`;
    if (!idx.includes(ms)) { idx.push(ms); idx.sort(); saveIndex(idx); }
  } else {
    localStorage.removeItem(key);
    const idx = loadIndex();
    const ms = `${y}-${String(m).padStart(2,'0')}`;
    saveIndex(idx.filter(x => x !== ms));
  }
}

function loadDayEntries(y, m, d) {
  const md = loadMonth(y, m);
  const dk = getDayKey(y, m, d);
  const raw = md[dk];
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  // Migrate legacy single entry
  return [{ id: genId(), mood: raw.mood || '', title: raw.title || '', content: raw.content || '', createdAt: raw.createdAt || new Date().toISOString(), updatedAt: raw.updatedAt || new Date().toISOString() }];
}

// BUGFIX: save all entries including empty ones (they're placeholders the user explicitly created)
function saveDayEntries(y, m, d, entries) {
  const md = loadMonth(y, m);
  const dk = getDayKey(y, m, d);
  const now = new Date().toISOString();

  // Only filter empty entries when there's at least one non-empty entry.
  // If ALL are empty, keep all — the user is drafting multiple blocks.
  const nonEmpty = entries.filter(e => e.title || e.content || e.mood);
  const toSave = nonEmpty.length > 0 ? nonEmpty : entries;

  if (toSave.length === 0) {
    delete md[dk];
  } else {
    md[dk] = toSave.map(e => {
      if (!e.createdAt) e.createdAt = now;
      e.updatedAt = now;
      if (!e.id) e.id = genId();
      return e;
    });
  }
  saveMonth(y, m, md);
}

function genId() { return 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function countDayEntries(dd) {
  if (!dd) return 0;
  if (Array.isArray(dd)) return dd.filter(e => e.title || e.content || e.mood).length;
  return (dd.title || dd.content || dd.mood) ? 1 : 0;
}
function getDayPrimaryMood(dd) {
  if (!dd) return '';
  if (Array.isArray(dd)) { for (const e of dd) { if (e.mood) return e.mood; } return ''; }
  return dd.mood || '';
}

// ==================== MOODS ====================
const MOODS = [
  { emoji: '😄', label: '开心' }, { emoji: '😊', label: '不错' }, { emoji: '🤩', label: '兴奋' },
  { emoji: '🤔', label: '思考' }, { emoji: '🧐', label: '专注' }, { emoji: '💪', label: '有动力' },
  { emoji: '🙏', label: '感恩' }, { emoji: '😐', label: '一般' }, { emoji: '😴', label: '疲惫' },
  { emoji: '😔', label: '低落' }, { emoji: '😤', label: '烦躁' }, { emoji: '😰', label: '焦虑' },
  { emoji: '🥳', label: '庆祝' }, { emoji: '😡', label: '生气' },
];

// ==================== STATE ====================
let currentYear, currentMonth, currentDay;
let currentMonthData = {};
let currentEntries = [];
let currentView = 'editor';
let currentFontSize = 15;
let autoSaveTimer = null;
let reminderTimer = null;
let reminderSettings = { enabled: false, time: '23:00' };
let moodVisible = true;

const today = new Date();
currentYear = today.getFullYear();
currentMonth = today.getMonth() + 1;
currentDay = today.getDate();

// ==================== DOM REFS ====================
const $calendarDays = document.getElementById('calendarDays');
const $monthLabel = document.getElementById('monthLabel');
const $mainHeader = document.getElementById('mainHeader');
const $dateDisplay = document.getElementById('dateDisplay');
const $emptyState = document.getElementById('emptyState');
const $logBlocks = document.getElementById('logBlocks');
const $btnAddBlock = document.getElementById('btnAddBlock');
const $listView = document.getElementById('listView');
const $btnSaveAll = document.getElementById('btnSaveAll');
const $fsLabel = document.getElementById('fsLabel');
const $searchInput = document.getElementById('searchInput');
const $searchResults = document.getElementById('searchResults');
const $stats = document.getElementById('stats');
const $toast = document.getElementById('toast');
const $exportModal = document.getElementById('exportModal');
const $exportPreview = document.getElementById('exportPreview');
const $exportMonthLabel = document.getElementById('exportMonthLabel');
const $themeToggle = document.getElementById('themeToggle');
const $reminderToggle = document.getElementById('reminderToggle');
const $reminderLabel = document.getElementById('reminderLabel');
const $reminderTime = document.getElementById('reminderTime');
const $reminderTimeRow = document.getElementById('reminderTimeRow');
const $reminderStatus = document.getElementById('reminderStatus');
const $reminderModal = document.getElementById('reminderModal');
const $moodToggle = document.getElementById('moodToggle');
const $moodToggleLabel = document.getElementById('moodToggleLabel');

// ==================== HELPERS ====================
function formatDate(y, m, d) {
  const date = new Date(y, m - 1, d);
  const wds = ['日','一','二','三','四','五','六'];
  return { full: `${y}年 ${m}月 ${d}日`, weekday: `星期${wds[date.getDay()]}`, iso: getDayKey(y, m, d) };
}
function toast(msg, dur = 2000) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout($toast._timeout);
  $toast._timeout = setTimeout(() => $toast.classList.remove('show'), dur);
}
function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function getFirstDayOfWeek(y, m) { return new Date(y, m - 1, 1).getDay(); }

// ==================== FONT SIZE ====================
function applyFontSize(sz) {
  currentFontSize = sz;
  document.documentElement.style.setProperty('--content-font-size', sz + 'px');
  document.documentElement.style.setProperty('--title-font-size', (sz * 0.9) + 'px');
  $fsLabel.textContent = sz + 'px';
  localStorage.setItem(FONT_SIZE_KEY, sz);
}
function increaseFont() { if (currentFontSize < 24) applyFontSize(currentFontSize + 1); }
function decreaseFont() { if (currentFontSize > 11) applyFontSize(currentFontSize - 1); }
function loadFontSize() {
  const s = parseInt(localStorage.getItem(FONT_SIZE_KEY));
  applyFontSize(s && s >= 11 && s <= 24 ? s : 15);
}

// ==================== VIEW MODE ====================
function setView(mode) {
  currentView = mode;
  document.getElementById('viewEditor').classList.toggle('active', mode === 'editor');
  document.getElementById('viewList').classList.toggle('active', mode === 'list');
  localStorage.setItem(VIEW_MODE_KEY, mode);
  if (mode === 'editor') {
    $listView.style.display = 'none';
    $logBlocks.style.display = 'flex';
    $btnAddBlock.style.display = 'flex';
    renderEditorBlocks();
  } else {
    autoSaveCurrentEntries();
    $logBlocks.style.display = 'none';
    $btnAddBlock.style.display = 'none';
    $listView.style.display = 'flex';
    renderListView();
  }
}

// ==================== CALENDAR ====================
function renderCalendar() {
  currentMonthData = loadMonth(currentYear, currentMonth);
  const dim = getDaysInMonth(currentYear, currentMonth);
  const fd = getFirstDayOfWeek(currentYear, currentMonth);
  const dp = getDaysInMonth(currentYear, currentMonth - 1);
  $monthLabel.textContent = `${currentYear}年 ${currentMonth}月`;
  let html = '';

  for (let i = fd - 1; i >= 0; i--) {
    const d = dp - i;
    const m = currentMonth === 1 ? 12 : currentMonth - 1;
    const y = currentMonth === 1 ? currentYear - 1 : currentYear;
    const k = getDayKey(y, m, d);
    const cnt = countDayEntries(loadMonth(y, m)[k]);
    html += `<button class="day other-month" data-date="${k}"><span class="day-num" style="font:400 13px/1 Courier New,monospace;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision">${d}</span><span class="day-badge">${cnt > 0 ? '<span class="dot"></span>' : ''}</span></button>`;
  }

  for (let d = 1; d <= dim; d++) {
    const k = getDayKey(currentYear, currentMonth, d);
    const dd = currentMonthData[k];
    const cnt = countDayEntries(dd);
    const mood = getDayPrimaryMood(dd);
    const isToday = currentYear === today.getFullYear() && currentMonth === today.getMonth() + 1 && d === today.getDate();
    const isActive = currentDay === d;
    let cls = 'day';
    if (isToday) cls += ' today';
    if (isActive) cls += ' active';
    let badge = mood ? `<span class="mood-mini">${mood}</span>` : (cnt > 0 ? '<span class="dot"></span>' : '');
    html += `<button class="${cls}" data-date="${k}"><span class="day-num" style="font:400 13px/1 Courier New,monospace;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision">${d}</span><span class="day-badge">${badge}</span></button>`;
  }

  const tc = fd + dim;
  const rem = tc % 7 === 0 ? 0 : 7 - (tc % 7);
  const nm = currentMonth === 12 ? 1 : currentMonth + 1;
  const ny = currentMonth === 12 ? currentYear + 1 : currentYear;
  for (let d = 1; d <= rem; d++) {
    const k = getDayKey(ny, nm, d);
    const cnt = countDayEntries(loadMonth(ny, nm)[k]);
    html += `<button class="day other-month" data-date="${k}"><span class="day-num" style="font:400 13px/1 Courier New,monospace;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision">${d}</span><span class="day-badge">${cnt > 0 ? '<span class="dot"></span>' : ''}</span></button>`;
  }

  $calendarDays.innerHTML = html;
  $calendarDays.querySelectorAll('.day').forEach(btn => {
    btn.addEventListener('click', () => {
      const [y, m, d] = btn.dataset.date.split('-').map(Number);
      navigateTo(y, m, d);
    });
  });
}

function navigateTo(y, m, d) {
  autoSaveCurrentEntries();
  currentYear = y; currentMonth = m; currentDay = d;
  currentEntries = loadDayEntries(y, m, d);
  renderCalendar();
  refreshUI();
}

function refreshUI() {
  const di = formatDate(currentYear, currentMonth, currentDay);
  $dateDisplay.innerHTML = `${di.full} <span class="weekday">${di.weekday}</span>`;
  $mainHeader.style.display = 'flex';
  $emptyState.style.display = 'none';

  if (currentView === 'editor') {
    $listView.style.display = 'none';
    $logBlocks.style.display = 'flex';
    $btnAddBlock.style.display = 'flex';
    renderEditorBlocks();
  } else {
    $logBlocks.style.display = 'none';
    $btnAddBlock.style.display = 'none';
    $listView.style.display = 'flex';
    renderListView();
  }
  $btnSaveAll.classList.remove('saved');
  $btnSaveAll.innerHTML = '💾 保存全部';
}

// ==================== EDITOR BLOCKS ====================
function renderEditorBlocks() {
  $logBlocks.innerHTML = '';
  if (currentEntries.length === 0) {
    currentEntries = [createEmptyEntry()];
  }
  currentEntries.forEach((entry, idx) => {
    $logBlocks.appendChild(createBlockElement(entry, idx));
  });
  $btnAddBlock.textContent = '＋ 添加一条日志';
}

function createEmptyEntry() {
  return { id: genId(), mood: '', title: '', content: '', images: [], createdAt: null, updatedAt: null };
}

function createBlockElement(entry, idx) {
  const div = document.createElement('div');
  div.className = 'log-block';
  div.dataset.entryId = entry.id;

  const sel = entry.mood || '';
  const mhtml = MOODS.map(m =>
    `<div style="display:flex;flex-direction:column;align-items:center;">
      <button class="mood-btn ${m.emoji === sel ? 'selected' : ''}" data-mood="${m.emoji}">${m.emoji}</button>
      <span class="mood-label">${m.label}</span>
    </div>`
  ).join('');

  // Build image thumbnails HTML
  const images = entry.images || [];
  const imgsHTML = images.map((img, i) => `
    <div class="img-thumb" data-img-index="${i}">
      <img src="${img.dataUrl}" alt="图片${i+1}">
      <button class="img-remove" title="移除图片">✕</button>
    </div>
  `).join('');

  div.innerHTML = `
    <div class="log-block-header">
      <span class="block-index">日志 #${idx + 1}</span>
      <button class="btn-remove-block" title="删除这条日志">✕ 删除</button>
    </div>
    <div class="mood-grid" style="${moodVisible ? '' : 'display:none;'}">${mhtml}</div>
    <input type="text" class="block-title" placeholder="记录标题..." value="${escHtml(entry.title)}">
    <textarea class="block-content" placeholder="记录内容...&#10;支持 Markdown 风格&#10;可以直接 Ctrl+V 粘贴截图">${escHtml(entry.content)}</textarea>
    <div class="images-area">${imgsHTML}</div>
    <button class="img-add-btn" type="button">🖼️ 添加图片</button>
    <div class="block-meta">${entry.createdAt ? '创建于 ' + new Date(entry.createdAt).toLocaleString('zh-CN') : ''}${entry.updatedAt ? ' | 更新于 ' + new Date(entry.updatedAt).toLocaleString('zh-CN') : ''}</div>
  `;

  // Mood
  div.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const mood = btn.dataset.mood;
      const all = div.querySelectorAll('.mood-btn');
      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        entry.mood = '';
      } else {
        all.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        entry.mood = mood;
      }
      markDirty();
    });
  });

  const ti = div.querySelector('.block-title');
  const ct = div.querySelector('.block-content');
  ti.addEventListener('input', () => { entry.title = ti.value; markDirty(); });
  ct.addEventListener('input', () => { entry.content = ct.value; markDirty(); });

  div.querySelector('.btn-remove-block').addEventListener('click', () => {
    if (currentEntries.length <= 1) {
      if (confirm('这是当天最后一条日志，删除后当天记录将清空。确定删除？')) {
        currentEntries = [];
        saveDayEntries(currentYear, currentMonth, currentDay, []);
        currentEntries = loadDayEntries(currentYear, currentMonth, currentDay);
        renderEditorBlocks();
        refreshAll();
        toast('🗑️ 已删除');
      }
    } else {
      currentEntries = currentEntries.filter(e => e.id !== entry.id);
      collectAndSave();
      currentEntries = loadDayEntries(currentYear, currentMonth, currentDay);
      renderEditorBlocks();
      refreshAll();
      toast('🗑️ 日志已删除');
    }
  });

  // --- Image: paste handler on textarea ---
  ct.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        const reader = new FileReader();
        reader.onload = () => addImageToBlock(div, reader.result);
        reader.readAsDataURL(blob);
        break;
      }
    }
  });

  // --- Image: click thumbnail → lightbox ---
  div.querySelectorAll('.img-thumb img').forEach(img => {
    img.addEventListener('click', () => {
      const lb = document.getElementById('imgLightbox');
      lb.querySelector('img').src = img.src;
      lb.classList.add('visible');
    });
  });

  // --- Image: remove button ---
  div.querySelectorAll('.img-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      btn.parentElement.remove();
      markDirty();
    });
  });

  // --- Image: add button → file picker ---
  div.querySelector('.img-add-btn').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.onchange = () => {
      for (const file of input.files) {
        const reader = new FileReader();
        reader.onload = () => addImageToBlock(div, reader.result);
        reader.readAsDataURL(file);
      }
    };
    input.click();
  });

  return div;
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Image helpers ---
function addImageToBlock(block, dataUrl) {
  const area = block.querySelector('.images-area');
  const idx = area.children.length;
  const thumb = document.createElement('div');
  thumb.className = 'img-thumb';
  thumb.dataset.imgIndex = idx;
  thumb.innerHTML = `
    <img src="${dataUrl}" alt="图片${idx+1}">
    <button class="img-remove" title="移除图片">✕</button>
  `;
  // Lightbox click
  thumb.querySelector('img').addEventListener('click', () => {
    const lb = document.getElementById('imgLightbox');
    lb.querySelector('img').src = dataUrl;
    lb.classList.add('visible');
  });
  // Remove click
  thumb.querySelector('.img-remove').addEventListener('click', (e) => {
    e.stopPropagation();
    thumb.remove();
    markDirty();
  });
  area.appendChild(thumb);
  markDirty();
}

function collectEntriesFromDOM() {
  const blocks = $logBlocks.querySelectorAll('.log-block');
  const entries = [];
  blocks.forEach(block => {
    const id = block.dataset.entryId;
    const ti = block.querySelector('.block-title');
    const ct = block.querySelector('.block-content');
    const mb = block.querySelector('.mood-btn.selected');
    const title = ti ? ti.value.trim() : '';
    const content = ct ? ct.value.trim() : '';
    const mood = mb ? mb.dataset.mood : '';

    // Collect images from thumbnails
    const imgs = [];
    block.querySelectorAll('.img-thumb img').forEach(img => {
      imgs.push({ dataUrl: img.src });
    });

    const existing = currentEntries.find(e => e.id === id);
    entries.push({ id: id || genId(), mood, title, content, images: imgs, createdAt: existing?.createdAt || null, updatedAt: existing?.updatedAt || null });
  });
  return entries;
}

function collectAndSave() {
  currentEntries = collectEntriesFromDOM();
  saveDayEntries(currentYear, currentMonth, currentDay, currentEntries);
}

function markDirty() {
  $btnSaveAll.classList.remove('saved');
  $btnSaveAll.innerHTML = '💾 保存全部';
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => autoSaveCurrentEntries(), 2000);
}

function autoSaveCurrentEntries() {
  clearTimeout(autoSaveTimer);
  if (currentView !== 'editor') return;
  const entries = collectEntriesFromDOM();
  const hasAny = entries.some(e => e.title || e.content || e.mood);
  if (!hasAny && currentEntries.every(e => !e.title && !e.content && !e.mood)) return;
  currentEntries = entries;
  saveDayEntries(currentYear, currentMonth, currentDay, currentEntries);
  currentEntries = loadDayEntries(currentYear, currentMonth, currentDay);
  $btnSaveAll.classList.add('saved');
  $btnSaveAll.innerHTML = '✅ 已保存';
  renderCalendar();
  updateStats();
}

function manualSaveAll() {
  clearTimeout(autoSaveTimer);
  if (currentView === 'editor') {
    currentEntries = collectEntriesFromDOM();
    saveDayEntries(currentYear, currentMonth, currentDay, currentEntries);
    currentEntries = loadDayEntries(currentYear, currentMonth, currentDay);
    renderEditorBlocks();
  }
  $btnSaveAll.classList.add('saved');
  $btnSaveAll.innerHTML = '✅ 已保存';
  renderCalendar();
  updateStats();
  toast('✅ 全部日志已保存');
}

function refreshAll() { renderCalendar(); updateStats(); }

// ==================== ADD BLOCK ====================
function addBlock() {
  // Save current DOM state to entries array (without re-rendering)
  currentEntries = collectEntriesFromDOM();

  // Create new entry and append to array
  const newEntry = createEmptyEntry();
  currentEntries.push(newEntry);

  // Directly append a new block to the DOM (don't re-render, avoids focus loss)
  const newBlock = createBlockElement(newEntry, currentEntries.length - 1);
  $logBlocks.appendChild(newBlock);

  // Persist to storage
  saveDayEntries(currentYear, currentMonth, currentDay, currentEntries);
  markDirty();

  // Scroll to the new block and focus its title
  newBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
  const title = newBlock.querySelector('.block-title');
  if (title) title.focus();

  toast(`已添加日志 #${currentEntries.length}`);
}

// ==================== LIST VIEW ====================
function renderListView() {
  if (!currentMonthData || Object.keys(currentMonthData).length === 0) {
    currentMonthData = loadMonth(currentYear, currentMonth);
  }
  const all = [];
  for (const [dk, dd] of Object.entries(currentMonthData)) {
    const entries = Array.isArray(dd) ? dd : [dd];
    entries.forEach((entry, idx) => {
      if (!entry.title && !entry.content && !entry.mood) return;
      all.push({ dayKey: dk, entry, blockIdx: idx, total: entries.filter(e => e.title || e.content || e.mood).length });
    });
  }
  all.sort((a, b) => b.dayKey.localeCompare(a.dayKey));

  if (all.length === 0) {
    $listView.innerHTML = `<div class="list-empty"><span class="big-icon">📭</span><p>${currentYear}年 ${currentMonth}月 暂无日志记录</p></div>`;
    return;
  }

  $listView.innerHTML = all.map(item => {
    const [y, m, d] = item.dayKey.split('-').map(Number);
    const di = formatDate(y, m, d);
    const preview = item.entry.content ? item.entry.content.replace(/\n/g, ' ').slice(0, 100) + (item.entry.content.length > 100 ? '...' : '') : '(无内容)';
    const tag = item.total > 1 ? `<span class="lc-block-tag">#${item.blockIdx + 1}/${item.total}</span>` : '';
    return `<div class="list-card" data-date="${item.dayKey}" data-block="${item.blockIdx}">
      <div class="lc-mood">${item.entry.mood || '📝'}</div>
      <div class="lc-body">
        <div class="lc-date">${di.full} ${di.weekday}</div>
        <div class="lc-title">${escHtml(item.entry.title || '(无标题)')} ${tag}</div>
        <div class="lc-preview">${escHtml(preview)}</div>
      </div>
    </div>`;
  }).join('');

  $listView.querySelectorAll('.list-card').forEach(card => {
    card.addEventListener('click', () => {
      const [y, m, d] = card.dataset.date.split('-').map(Number);
      const bi = parseInt(card.dataset.block || '0');
      document.getElementById('viewEditor').click();
      navigateTo(y, m, d);
      setTimeout(() => {
        const blocks = $logBlocks.querySelectorAll('.log-block');
        if (blocks[bi]) {
          blocks[bi].scrollIntoView({ behavior: 'smooth', block: 'center' });
          blocks[bi].style.boxShadow = '0 0 0 3px var(--accent)';
          setTimeout(() => { blocks[bi].style.boxShadow = ''; }, 2000);
        }
      }, 200);
    });
  });
}

// ==================== SEARCH ====================
function search() {
  const q = $searchInput.value.trim().toLowerCase();
  if (!q) { $searchResults.classList.remove('visible'); return; }
  const idx = loadIndex();
  const results = [];
  for (const ms of idx) {
    const [y, m] = ms.split('-').map(Number);
    const md = loadMonth(y, m);
    for (const [dk, dd] of Object.entries(md)) {
      const entries = Array.isArray(dd) ? dd : [dd];
      entries.forEach(entry => {
        if (!entry.title && !entry.content) return;
        if ((entry.title + ' ' + entry.content).toLowerCase().includes(q)) results.push({ dayKey: dk, entry });
      });
    }
  }
  results.sort((a, b) => b.dayKey.localeCompare(a.dayKey));
  if (results.length === 0) {
    $searchResults.innerHTML = '<div class="search-result-item" style="color:var(--text-muted);">未找到匹配结果</div>';
  } else {
    $searchResults.innerHTML = results.slice(0, 20).map(r => {
      const [y, m, d] = r.dayKey.split('-').map(Number);
      const di = formatDate(y, m, d);
      return `<div class="search-result-item" data-date="${r.dayKey}"><span class="sr-mood">${r.entry.mood || '📝'}</span><span class="sr-date">${di.full}</span><span class="sr-title">${r.entry.title || '(无标题)'}</span></div>`;
    }).join('') + (results.length > 20 ? `<div class="search-result-item" style="color:var(--text-muted);">...还有 ${results.length - 20} 条结果</div>` : '');
  }
  $searchResults.classList.add('visible');
  $searchResults.querySelectorAll('.search-result-item[data-date]').forEach(item => {
    item.addEventListener('click', () => {
      const [y, m, d] = item.dataset.date.split('-').map(Number);
      setView('editor');
      navigateTo(y, m, d);
      $searchInput.value = '';
      $searchResults.classList.remove('visible');
    });
  });
}

// ==================== EXPORT ====================
function generateMonthMarkdown(y, m, withImages) {
  const md = loadMonth(y, m);
  const days = Object.keys(md).sort();
  if (days.length === 0) return { text: `# ${y}年 ${m}月 科研日志\n\n暂无记录。`, images: [] };
  let out = `# ${y}年 ${m}月 科研日志\n\n`;
  const allImages = []; // { idx, dataUrl, ext }
  let imgCounter = 0;

  for (const dk of days) {
    const [yy, mm, dd] = dk.split('-').map(Number);
    const di = formatDate(yy, mm, dd);
    const entries = Array.isArray(md[dk]) ? md[dk] : [md[dk]];
    out += `## ${di.full} ${di.weekday}\n\n`;
    entries.forEach((entry, idx) => {
      if (!entry.title && !entry.content && !entry.mood && (!entry.images || entry.images.length === 0)) return;
      if (entries.filter(e => e.title || e.content || e.mood || (e.images && e.images.length > 0)).length > 1) {
        out += `### 记录 #${idx + 1}  ${entry.mood || ''}\n\n`;
      } else if (entry.mood) {
        out += `> 心情：${entry.mood}\n\n`;
      }
      if (entry.title) out += `**${entry.title}**\n\n`;
      if (entry.content) out += entry.content + '\n\n';
      // Images
      if (entry.images && entry.images.length > 0) {
        entry.images.forEach(img => {
          imgCounter++;
          const ext = img.dataUrl.match(/^data:image\/(\w+);/)?.[1] || 'png';
          const fname = `img_${String(imgCounter).padStart(3, '0')}.${ext}`;
          if (withImages) {
            out += `![图片${imgCounter}](images/${fname})\n\n`;
          } else {
            out += `[📷 图片${imgCounter}]\n\n`;
          }
          allImages.push({ fname, dataUrl: img.dataUrl });
        });
      }
    });
    out += '---\n\n';
  }
  return { text: out, images: allImages };
}

function openExport() {

  $exportModal.classList.add('visible');

// --- ZIP export (markdown + images) ---
async function exportZip() {
  closeExport();
  toast('📦 正在生成 ZIP...');
  try {
    const { text, images } = generateMonthMarkdown(currentYear, currentMonth, true);
    const zip = new JSZip();
    const folderName = `科研日志_${currentYear}年${currentMonth}月`;
    const folder = zip.folder(folderName);
    folder.file('日志.md', text);

    if (images.length > 0) {
      const imgFolder = folder.folder('images');
      images.forEach(img => {
        // Strip data URL prefix to get raw base64
        const base64 = img.dataUrl.replace(/^data:image\/\w+;base64,/, '');
        imgFolder.file(img.fname, base64, { base64: true });
      });
    }

    const blob = await zip.generateAsync({ type: 'blob' });
    downloadBlob(blob, `${folderName}.zip`);
    toast('✅ ZIP 已下载！解压后查看');
  } catch (err) {
    console.error(err);
    toast('❌ 导出失败：' + err.message);
  }
}

// --- Plain .md download ---
function exportMd() {
  closeExport();
  const { text } = generateMonthMarkdown(currentYear, currentMonth, false);
  const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
  const fname = `科研日志_${currentYear}年${currentMonth}月.md`;
  downloadBlob(blob, fname);
  toast('✅ .md 文件已下载');
}

// --- Copy to clipboard ---
function copyExport() {
  const { text } = generateMonthMarkdown(currentYear, currentMonth, false);
  navigator.clipboard.writeText(text).then(() => { toast('📋 已复制到剪贴板'); closeExport(); })
  .catch(() => {
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('📋 已复制到剪贴板'); closeExport();
  });
}

// Helper: trigger download
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ==================== STATS ====================
function updateStats() {
  const idx = loadIndex();
  let td = 0, te = 0;
  for (const ms of idx) {
    const [y, m] = ms.split('-').map(Number);
    for (const dd of Object.values(loadMonth(y, m))) {
      td++;
      te += Array.isArray(dd) ? dd.filter(e => e.title || e.content || e.mood).length : ((dd.title || dd.content || dd.mood) ? 1 : 0);
    }
  }
  $stats.textContent = `📊 ${idx.length} 个月 · ${td} 天 · ${te} 条记录`;
}

// ==================== REMINDER ====================
function loadReminderSettings() {
  try {
    const raw = localStorage.getItem(REMINDER_KEY);
    if (raw) reminderSettings = JSON.parse(raw);
  } catch { reminderSettings = { enabled: false, time: '23:00' }; }
  $reminderToggle.checked = reminderSettings.enabled;
  $reminderTime.value = reminderSettings.time;
  $reminderLabel.textContent = reminderSettings.enabled ? '已开启' : '已关闭';
  $reminderTimeRow.style.display = reminderSettings.enabled ? 'flex' : 'none';
  updateReminderStatus();
}

function loadMoodSetting() {
  const saved = localStorage.getItem('drlog-mood-visible');
  moodVisible = saved === null ? true : (saved === 'true');
  $moodToggle.checked = moodVisible;
  $moodToggleLabel.textContent = moodVisible ? '已开启' : '已关闭';
}

function toggleMoodBlocks() {
  moodVisible = $moodToggle.checked;
  localStorage.setItem('drlog-mood-visible', moodVisible);
  $moodToggleLabel.textContent = moodVisible ? '已开启' : '已关闭';
  // Update all visible mood grids
  document.querySelectorAll('.mood-grid').forEach(grid => {
    grid.style.display = moodVisible ? '' : 'none';
  });
}

function saveReminderSettings() {
  reminderSettings.enabled = $reminderToggle.checked;
  reminderSettings.time = $reminderTime.value;
  localStorage.setItem(REMINDER_KEY, JSON.stringify(reminderSettings));
  $reminderLabel.textContent = reminderSettings.enabled ? '已开启' : '已关闭';
  $reminderTimeRow.style.display = reminderSettings.enabled ? 'flex' : 'none';
  updateReminderStatus();
  if (reminderSettings.enabled) startReminderTimer();
  else stopReminderTimer();
}

function updateReminderStatus() {
  if (!reminderSettings.enabled) {
    $reminderStatus.textContent = '';
    return;
  }
  const lastKey = localStorage.getItem(REMINDER_LAST_KEY);
  if (lastKey) {
    const lastDate = lastKey.split('T')[0];
    const todayStr = today.toISOString().split('T')[0];
    if (lastDate === todayStr) {
      $reminderStatus.textContent = '✅ 今日已提醒过';
    } else {
      $reminderStatus.textContent = `⏰ 将在 ${reminderSettings.time} 提醒`;
    }
  } else {
    $reminderStatus.textContent = `⏰ 将在 ${reminderSettings.time} 提醒`;
  }
}

function startReminderTimer() {
  stopReminderTimer();
  reminderTimer = setInterval(checkReminder, 30000);
  checkReminder(); // Check immediately
}

function stopReminderTimer() {
  if (reminderTimer) { clearInterval(reminderTimer); reminderTimer = null; }
}

function checkReminder() {
  if (!reminderSettings.enabled) return;
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const lastKey = localStorage.getItem(REMINDER_LAST_KEY);
  const lastDate = lastKey ? lastKey.split('T')[0] : '';

  // Already reminded today
  if (lastDate === todayStr) return;

  const [h, m] = reminderSettings.time.split(':').map(Number);
  if (now.getHours() === h && now.getMinutes() >= m && now.getMinutes() < m + 2) {
    showReminder();
  }
}

function showReminder() {
  const todayStr = today.toISOString().split('T')[0];
  localStorage.setItem(REMINDER_LAST_KEY, new Date().toISOString());
  updateReminderStatus();

  // Show browser notification if available
  if ('Notification' in window && Notification.permission === 'granted') {
    try { new Notification('📓 科研日志提醒', { body: '该写今天的科研总结啦！回顾一下今天做了什么研究吧', icon: '📝' }); } catch {}
  }
  // Request permission for next time
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  $reminderModal.classList.add('visible');
}

function dismissReminder(todayOnly) {
  $reminderModal.classList.remove('visible');
  if (todayOnly) {
    localStorage.setItem(REMINDER_LAST_KEY, new Date().toISOString());
    updateReminderStatus();
  }
}

function snoozeReminder() {
  $reminderModal.classList.remove('visible');
  // Clear last reminder so it fires again in ~10 min
  const tenMinAgo = new Date(Date.now() - 10 * 60 * 1000).toISOString();
  localStorage.setItem(REMINDER_LAST_KEY, tenMinAgo);
  updateReminderStatus();
  toast('🔔 10 分钟后会再次提醒');
}

document.getElementById('btnExport').addEventListener('click', openExport);
document.getElementById('btnCloseModal').addEventListener('click', closeExport);
document.getElementById('btnExportZip').addEventListener('click', exportZip);
document.getElementById('btnExportMd').addEventListener('click', exportMd);
document.getElementById('btnExportClip').addEventListener('click', copyExport);
$exportModal.addEventListener('click', (e) => { if (e.target === $exportModal) closeExport(); });

// Image lightbox
const $imgLightbox = document.getElementById('imgLightbox');
$imgLightbox.addEventListener('click', () => $imgLightbox.classList.remove('visible'));
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') $imgLightbox.classList.remove('visible');
});

$themeToggle.addEventListener('click', toggleTheme);

// Reminder events
$reminderToggle.addEventListener('change', saveReminderSettings);
$moodToggle.addEventListener('change', toggleMoodBlocks);
$reminderTime.addEventListener('change', saveReminderSettings);
document.getElementById('btnRemWrite').addEventListener('click', () => {
  dismissReminder(true);
  setView('editor');
  navigateTo(today.getFullYear(), today.getMonth() + 1, today.getDate());
  // Auto-focus the first empty block's content
  setTimeout(() => {
    const firstBlock = $logBlocks.querySelector('.log-block');
    if (firstBlock) {
      // Check if title is empty, focus title first
      const titleEl = firstBlock.querySelector('.block-title');
      if (titleEl && !titleEl.value.trim()) {
        titleEl.focus();
        titleEl.placeholder = '今日总结...';
      } else {
        const contentEl = firstBlock.querySelector('.block-content');
        if (contentEl) contentEl.focus();
      }
    }
  }, 200);
});
document.getElementById('btnRemSnooze').addEventListener('click', snoozeReminder);
document.getElementById('btnRemDismiss').addEventListener('click', () => dismissReminder(true));
$reminderModal.addEventListener('click', (e) => { if (e.target === $reminderModal) dismissReminder(false); });

window.addEventListener('beforeunload', () => {
  if (currentView === 'editor') autoSaveCurrentEntries();
});

// ==================== INIT ====================
function init() {
  initTheme();
  loadFontSize();
  loadReminderSettings();
  loadMoodSetting();

  const savedView = localStorage.getItem(VIEW_MODE_KEY);
  if (savedView === 'list') currentView = 'list';

  currentEntries = loadDayEntries(currentYear, currentMonth, currentDay);
  currentMonthData = loadMonth(currentYear, currentMonth);
  renderCalendar();
  refreshUI();
  updateStats();

  document.getElementById('viewEditor').classList.toggle('active', currentView === 'editor');
  document.getElementById('viewList').classList.toggle('active', currentView === 'list');

  if (currentView === 'list') {
    $logBlocks.style.display = 'none';
    $btnAddBlock.style.display = 'none';
    $listView.style.display = 'flex';
    renderListView();
  }

  if (reminderSettings.enabled) startReminderTimer();
}

init();
</script>
</body>
</html>
